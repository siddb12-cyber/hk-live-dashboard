name: Fetch HK Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour at :00
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to commit JSON files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests openpyxl

      - name: Run data fetch script
        env:
          UC_TENANT:   ${{ secrets.UC_TENANT }}
          UC_USERNAME: ${{ secrets.UC_USERNAME }}
          UC_PASSWORD: ${{ secrets.UC_PASSWORD }}
        run: python fetch_data.py

      - name: Commit updated data files
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: update dashboard data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
